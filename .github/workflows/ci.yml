name : CI

on : 
  push :
    branches :
      - leancage-analysis-fe
      - recuritment-analysis-fe
      - resume-analysis-fe
      - main
      
  pull_request :
    branches :
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Build Test
        run: npm run build